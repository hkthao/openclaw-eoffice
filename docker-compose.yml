services:
  agent:
    build: .
    container_name: openclaw-eoffice-agent
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/.venv
      - ./tmp/inputs:/app/tmp/inputs
      - ./tmp/outputs:/app/tmp/outputs
    restart: unless-stopped
    shm_size: '2gb' # Tránh crash trình duyệt khi rendering
    ports:
      - "6080:6080" # noVNC Port để xem visual debug qua browser
      - "5900:5900" # VNC Port (truy cập bằng VNC client truyền thống)
    extra_hosts:
      - "host.docker.internal:host-gateway" # Truy cập Ollama chạy ở máy host

networks:
  default:
    name: openclaw-eoffice-net

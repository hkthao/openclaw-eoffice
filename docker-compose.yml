services:
  agent:
    build: .
    container_name: openclaw-eoffice-agent
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/.venv # Tránh ghi đè venv khi mount volume trong dev
    restart: unless-stopped
    # Nếu agent có giao diện UI hoặc API, hãy mở port ở đây
    # ports:
    #   - "8000:8000"


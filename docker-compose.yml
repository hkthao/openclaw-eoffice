services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "18789:18789" # Gateway UI & API
    volumes:
      - ~/.openclaw:/home/node/.openclaw # Cấu hình agent
      - ./workspace:/home/node/openclaw/workspace # Không gian làm việc
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway" # Truy cập Ollama chạy ở máy host macOS

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    profiles: ["cli"]
    volumes:
      - ~/.openclaw:/home/node/.openclaw
      - ./workspace:/home/node/openclaw/workspace
    env_file:
      - .env
    entrypoint: ["node", "dist/index.js"]

networks:
  default:
    name: openclaw-eoffice-net
